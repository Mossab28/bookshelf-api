<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Moss'Ab Mirande-Ney</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0a0a0f;
      color: #d4c9b0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }
    h1 { font-size: 1.6rem; letter-spacing: 2px; margin-bottom: .5rem; color: #fff; }
    .subtitle { font-size: .85rem; opacity: .5; margin-bottom: 3rem; }
    .subtitle a { color: #d4c9b0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      width: 100%;
      max-width: 700px;
    }
    .card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 1.5rem;
      text-decoration: none;
      color: #d4c9b0;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: #4361ee; transform: translateY(-2px); }
    .card h2 { font-size: 1rem; color: #fff; margin-bottom: .4rem; }
    .card p { font-size: .8rem; opacity: .6; line-height: 1.5; margin-bottom: .8rem; }
    .tags { display: flex; gap: .3rem; flex-wrap: wrap; }
    .tag {
      background: #1a1a2e;
      color: #4361ee;
      padding: .15rem .5rem;
      border-radius: 3px;
      font-size: .7rem;
    }
    .badge {
      display: inline-block;
      font-size: .65rem;
      padding: .1rem .4rem;
      border-radius: 3px;
      margin-left: .5rem;
      vertical-align: middle;
    }
    .live { background: #27ae60; color: #fff; }
  </style>
</head>
<body>
  <h1>PROJECTS</h1>
  <p class="subtitle"><a href="https://mossabmirandeney.fr">mossabmirandeney.fr</a></p>

  <div class="grid">
    <a href="/bookshelf/" class="card">
      <h2>BookShelf API <span class="badge live">LIVE</span></h2>
      <p>Room booking REST API with conflict detection, JWT auth, role-based access, and Zod validation.</p>
      <div class="tags">
        <span class="tag">Node.js</span>
        <span class="tag">Express</span>
        <span class="tag">TypeScript</span>
        <span class="tag">PostgreSQL</span>
        <span class="tag">Prisma</span>
        <span class="tag">JWT</span>
      </div>
    </a>
  </div>
</body>
</html>
