<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookShelf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>BookShelf</h1>
    <div id="auth-area">
      <button onclick="showLogin()">Login</button>
      <button onclick="showRegister()">Register</button>
    </div>
  </header>

  <!-- Auth Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="close" onclick="closeModal()">&times;</button>
      <h2 id="modal-title">Login</h2>
      <form id="auth-form" onsubmit="handleAuth(event)">
        <input type="text" id="auth-name" placeholder="Name" class="hidden">
        <input type="email" id="auth-email" placeholder="Email" required>
        <input type="password" id="auth-password" placeholder="Password" required>
        <button type="submit" id="auth-submit">Login</button>
        <p id="auth-error" class="error"></p>
      </form>
    </div>
  </div>

  <main>
    <!-- Rooms -->
    <section>
      <h2>Rooms</h2>
      <div id="rooms" class="grid"></div>
    </section>

    <!-- Booking form (shown when logged in) -->
    <section id="booking-section" class="hidden">
      <h2>New Booking</h2>
      <form id="booking-form" onsubmit="handleBooking(event)">
        <select id="book-room" required></select>
        <input type="text" id="book-title" placeholder="Meeting title" required>
        <input type="datetime-local" id="book-start" required>
        <input type="datetime-local" id="book-end" required>
        <textarea id="book-notes" placeholder="Notes (optional)" rows="2"></textarea>
        <button type="submit">Book</button>
        <p id="booking-error" class="error"></p>
        <p id="booking-success" class="success"></p>
      </form>
    </section>

    <!-- My bookings -->
    <section id="my-bookings-section" class="hidden">
      <h2>My Bookings</h2>
      <div id="my-bookings"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
